{% extends "base.html" %}
{% block title %}Login | Byte Business{% endblock %}

{% block content %}
<div class="page-shell">
  <div class="container auth-layout fade-up">
    <div class="auth-card">
      <span class="section-kicker">Account access</span>
      <h1>Welcome back</h1>
      <p>Sign in to leave reviews, manage bookmarks, and track your business activity.</p>
      <form method="POST" action="{{ url_for('auth.login') }}">
        <div>
          <label for="identifier">Username or email</label>
          <input id="identifier" name="identifier" type="text" placeholder="yourname or you@example.com" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter your password" required>
        </div>
        <p class="muted inline-link-row"><a href="{{ url_for('forgot_password.forgot_password') }}">Forgot password?</a></p>
        <button class="button" type="submit">Log in</button>
      </form>
      <p class="muted auth-meta">New here? <a href="{{ url_for('auth.register') }}">Create an account</a>.</p>
    </div>
  </div>
</div>
{% endblock %}
